<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" href="/estilo.css">
</head>

<body>
    <div th:insert="fragments/menu.html :: menuPrincipal"></div>

    <h1>Productos</h1>
    <a th:href="@{/producto/buscar}">Buscar</a>
    <a th:href="@{/producto/create-form}">Crear</a>

    <table class="entity-list">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Precio Unitario Compra</th>
                <th>Precio Unitario Venta</th>
                <th>Stock</th>
                <th>Volumen</th>
                <th>Ver</th>
                <th>Editar</th>
                <th>Eliminar</th>
            </tr>
        </thead>
        <tbody>

            <tr th:each="p : ${productos}" th:if="${p.nombre}">
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.precioUnitarioCompra}"></td>
                <td th:text="${p.precioUnitarioVenta}"></td>
                <td th:text="${p.stock}"></td>
                <td th:text="${p.volumen}"></td>
                <td>
                    <form th:action="@{/producto/view/{id}(id=${p.id})}">
                        <input type="submit" value="Ver" />
                    </form>
                </td>
                <td>
                    <form th:action="@{/producto/edit-form/{id}(id=${p.id})}">
                        <input type="submit" value="Editar" />
                    </form>
                </td>
                <td>
                    <form th:action="@{/producto/eliminar/{id}(id=${p.id})}" method="post">
                        <input type="submit" value="Eliminar" />
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>

</html>
